# Frontend nginx for the Docker Compose test stack: serves the SPA and reverse-proxies
# /api to the backend container, so the whole app is one shareable origin.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API → backend container (service name "backend" on the compose network).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25m;   # base64 PDF uploads can be large
    }

    # SPA history-API fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
